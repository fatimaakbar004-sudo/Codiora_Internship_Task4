<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Weather dashboard mockup</title>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#12121A"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </linearGradient>
    <linearGradient id="sun1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFD8A6"/>
      <stop offset="100%" stop-color="#FFB454"/>
    </linearGradient>
    <radialGradient id="blob5" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFB454" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFB454" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob6" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C6AEF" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7C6AEF" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur3"><feGaussianBlur stdDeviation="45"/></filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg3)"/>
  <circle cx="620" cy="140" r="180" fill="url(#blob5)" filter="url(#blur3)"/>
  <circle cx="150" cy="480" r="170" fill="url(#blob6)" filter="url(#blur3)"/>

  <rect x="100" y="110" width="600" height="380" rx="18" fill="#0F0F16" stroke="#2A2A38" stroke-width="1.5"/>

  <circle cx="230" cy="240" r="46" fill="url(#sun1)"/>
  <g stroke="#FFB454" stroke-width="4" stroke-linecap="round">
    <line x1="230" y1="164" x2="230" y2="180"/>
    <line x1="230" y1="300" x2="230" y2="316"/>
    <line x1="154" y1="240" x2="170" y2="240"/>
    <line x1="290" y1="240" x2="306" y2="240"/>
    <line x1="176" y1="186" x2="187" y2="197"/>
    <line x1="273" y1="283" x2="284" y2="294"/>
    <line x1="284" y1="186" x2="273" y2="197"/>
    <line x1="187" y1="283" x2="176" y2="294"/>
  </g>

  <text x="360" y="230" font-family="sans-serif" font-size="56" font-weight="700" fill="#F1F0F7">24°</text>
  <text x="360" y="262" font-family="sans-serif" font-size="16" fill="#9294AC">Sunny · Karachi</text>

  <g fill="none" stroke="#4B4B5E" stroke-width="1.5">
    <line x1="140" y1="410" x2="660" y2="410"/>
  </g>

  <g>
    <rect x="150" y="360" width="26" height="50" rx="6" fill="#2A2A38"/>
    <rect x="200" y="330" width="26" height="80" rx="6" fill="#3A3A48"/>
    <rect x="250" y="300" width="26" height="110" rx="6" fill="#7C6AEF"/>
    <rect x="300" y="340" width="26" height="70" rx="6" fill="#3A3A48"/>
    <rect x="350" y="320" width="26" height="90" rx="6" fill="#3A3A48"/>
    <rect x="400" y="290" width="26" height="120" rx="6" fill="url(#sun1)"/>
    <rect x="450" y="345" width="26" height="65" rx="6" fill="#3A3A48"/>
    <rect x="500" y="360" width="26" height="50" rx="6" fill="#2A2A38"/>
    <rect x="550" y="335" width="26" height="75" rx="6" fill="#3A3A48"/>
    <rect x="600" y="315" width="26" height="95" rx="6" fill="#3A3A48"/>
  </g>

  <text x="163" y="430" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#8B8FA3">Mon</text>
  <text x="213" y="430" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#8B8FA3">Tue</text>
  <text x="263" y="430" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#B7ACFF">Wed</text>
  <text x="313" y="430" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#8B8FA3">Thu</text>
  <text x="363" y="430" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#8B8FA3">Fri</text>
  <text x="413" y="430" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#FFD8A6">Sat</text>
  <text x="463" y="430" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#8B8FA3">Sun</text>
  <text x="513" y="430" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#8B8FA3">Mon</text>
  <text x="563" y="430" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#8B8FA3">Tue</text>
  <text x="613" y="430" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#8B8FA3">Wed</text>
</svg>
